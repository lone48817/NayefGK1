}

    h1 {

      gap: 8px;
  font-size: 0.9rem;

    }

    .points-diamond {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(10px);
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-weight: 800;
      font-size: 1.2rem;
      color: #FFE0A3;
      border: 1px solid #ffb347aa;
    }

    .name-panel {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .name-panel label {
      font-weight: 600;
      color: #ffefcf;
      font-size: 0.85rem;
    }

    #studentName {
      background: #fff8ec;

    .name-btn {

      border-radius: 40px;
      font-weight: bold;
      color: #1e2e36;
      cursor: pointer;
      font-size: 0.8rem;
    }

}

    .cat-btn {

      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #ffefcf;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .cat-btn:hover, .cat-btn.active-cat {
      background: #ffaa44;
      color: #1f2e36;
      border-color: #ffdd99;
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

      padding: 0.8rem 1.8rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(252, 248, 235, 0.94);
      overflow: hidden;
    }

    .question-zone {
      flex-shrink: 0;
    }

    .category-badge {
      display: inline-block;
      background: linear-gradient(120deg, #326b7c, #1d495a);
      color: #FFF5E6;
      font-weight: 700;
      padding: 4px 18px;
      border-radius: 30px;
      font-size: 0.7rem;
      margin-bottom: 0.7rem;

.question-flex {
  display: flex;
  align-items: center;       /* vertical center */
  justify-content: center;   /* horizontal center */

  margin-bottom: 0.8rem;
  flex-wrap: wrap;
}

.question-text {

  -webkit-background-clip: text;
  color: transparent;

}

    .speaker-glow {

      align-items: center;

      margin: 0.5rem 0 0.6rem;

      height: 30px;

      align-items: center;
      justify-content: center;
      border-radius: 40px;

      margin: 0.3rem 0 0.5rem;

      font-size: 0.8rem;
      flex-shrink: 0;
    }

      background: linear-gradient(120deg, #d5f5e2, #c2ebd1);

    .feedback-wrong {

      color: #fff3e0;

      font-size: 0.8rem;
      flex: 1;
      text-align: center;
    }

    .nav-btn:hover:not(:disabled) {

      color: #1e2f36;
    }

    .nav-btn:disabled {

      opacity: 0.5;
    }

    .counter {

      font-size: 0.7rem;
      font-weight: 600;
      color: #476b7a;

      .quiz-core { padding: 0.6rem 1rem; }

  </style>
</head>

    for (let i = 0; i < userAnswers.length; i++) if (userAnswers[i]?.earned) total++;

    updatePointsUI();
  }

  function speakMessage(msg, onEnd = null) {
    if (synth.speaking) synth.cancel();
    const utterance = new SpeechSynthesisUtterance(msg);
    utterance.lang = "en-US";
    utterance.rate = 0.9;
    if (onEnd) utterance.onend = onEnd;
    synth.speak(utterance);
  }

  function autoSpeakQuestion() {
    const q = currentQuestions[currentIdx];
    if (q) speakMessage(`${q.category}. ${q.text}`);
  }

    const displayName = studentName.trim() || "Nayef";
    if (correct) speakMessage(`Excellent, ${displayName}! That is correct. +1 point.`);

    const nameShow = studentName.trim() || "Nayef";
    if (isCor) {
      feedbackArea.innerHTML = `🎉 <strong>Perfect, ${nameShow}!</strong> +1 point. “${q.correct}” is right!`;
      feedbackArea.className = "feedback-card feedback-correct";
    } else {
      feedbackArea.innerHTML = `🌟 <strong>Not this time, ${nameShow}.</strong> Correct: <strong>${q.correct}</strong>. Keep shining!`;
      feedbackArea.className = "feedback-card feedback-wrong";
    }
    speakPersonalFeedback(isCor, q.correct);
    renderOptionsGrid();
  }

  function renderOptionsGrid() {
    const q = currentQuestions[currentIdx];
    const state = userAnswers[currentIdx];
    const answered = state?.selected !== null;
    optionsContainer.innerHTML = "";
    const letters = ["A", "B", "C", "D"];
    q.options.forEach((opt, idx) => {
      const optDiv = document.createElement("div");
      optDiv.className = "opt-card";
      if (answered) optDiv.classList.add("disabled-opt");
      const prefixSpan = document.createElement("span");
      prefixSpan.className = "opt-prefix";
      prefixSpan.innerText = letters[idx];
      const textSpan = document.createElement("span");
      textSpan.innerText = opt;
      optDiv.appendChild(prefixSpan);
      optDiv.appendChild(textSpan);
      if (answered) {
        if (opt === q.correct) optDiv.style.background = "#caf5dc";
        if (state.selected === opt && !state.isCorrect) optDiv.style.background = "#fddfd9";
        else if (state.selected === opt && state.isCorrect) optDiv.style.background = "#b7e9c7";
        optDiv.style.cursor = "default";
      } else {
        optDiv.addEventListener("click", () => { if (userAnswers[currentIdx]?.selected === null) submitAnswer(opt); });
        optDiv.style.cursor = "pointer";
      }
      optionsContainer.appendChild(optDiv);
    });
  }

  function loadQuestion() {
    const q = currentQuestions[currentIdx];
    if (!q) return;
    categoryTagSpan.innerText = q.category;
    questionTextEl.innerText = q.text;
    renderOptionsGrid();
    counterText.innerText = `📖 ${currentIdx+1} / ${currentQuestions.length}`;
    prevBtn.disabled = (currentIdx === 0);
    nextBtn.innerText = (currentIdx === currentQuestions.length-1) ? "🏁 FINISH" : "NEXT ▶";
    const nameNice = studentName.trim() || "Nayef";
    const ansState = userAnswers[currentIdx];
    if (ansState?.selected !== null) {
      if (ansState.isCorrect) {
        feedbackArea.innerHTML = `✅ <strong>Correct, ${nameNice}!</strong> +1 point.`;
        feedbackArea.className = "feedback-card feedback-correct";
      } else {
        feedbackArea.innerHTML = `❌ <strong>Incorrect, ${nameNice}.</strong> Answer: ${q.correct}.`;
        feedbackArea.className = "feedback-card feedback-wrong";
      }
    } else {
      feedbackArea.innerHTML = `🌸 ${nameNice}, choose an answer. +1 each correct!`;
      feedbackArea.className = "feedback-card";
    }
    if (synth.speaking) synth.cancel();
    setTimeout(() => autoSpeakQuestion(), 100);
  }

  function nextQuestion() {
    if (currentIdx < currentQuestions.length - 1) {
      currentIdx++;
      loadQuestion();
    } else {
      const finalName = studentName.trim() || "Nayef";
      const finalMsg = `Congratulations ${finalName}! Completed ${currentQuestions[0]?.category} with score ${points}/${currentQuestions.length}. Great!`;
      speakMessage(finalMsg);
      alert(`🏆 ${finalMsg}`);
      feedbackArea.innerHTML = `🎋 ${finalName}, you finished! Score: ${points}/${currentQuestions.length}. Change category or reset.`;
    }
  }

  function prevQuestion() { if (currentIdx > 0) { currentIdx--; loadQuestion(); } }

  function resetCategoryState() {
    currentIdx = 0;
    userAnswers = currentQuestions.map(() => ({ selected: null, isCorrect: null, earned: false }));
    points = 0;
    recalcPoints();
    loadQuestion();
  }

  function switchCategory(categoryId) {
    currentCategory = categoryId;
    currentQuestions = [...categoryMap[categoryId]];
    resetCategoryState();
    // update active class on buttons
    catButtons.forEach(btn => {
      if (btn.dataset.cat === categoryId) btn.classList.add("active-cat");
      else btn.classList.remove("active-cat");
    });
  }

  function resetQuiz() {
    if (synth.speaking) synth.cancel();
    switchCategory(currentCategory);
  }

  function setStudentName() {
    let newName = studentNameInput.value.trim();
    if (newName === "") newName = "Nayef";
    studentName = newName;
    studentNameInput.value = newName;
    speakMessage(`Hello ${studentName}, welcome to GK Quiz.`);
    const q = currentQuestions[currentIdx];
    if (q) feedbackArea.innerHTML = `👋 ${studentName}, ready? Choose answer.`;
    renderOptionsGrid();
  }

  function manualSpeak() { if (currentQuestions[currentIdx]) speakMessage(`${currentQuestions[currentIdx].category}. ${currentQuestions[currentIdx].text}`); }

  // Event listeners
  nextBtn.addEventListener("click", nextQuestion);
  prevBtn.addEventListener("click", prevQuestion);
  resetBtn.addEventListener("click", resetQuiz);
  speakBtn.addEventListener("click", manualSpeak);
  setNameBtn.addEventListener("click", setStudentName);
  studentNameInput.addEventListener("keypress", (e) => { if (e.key === "Enter") setStudentName(); });
  catButtons.forEach(btn => {
    btn.addEventListener("click", () => { switchCategory(btn.dataset.cat); });
  });

  // initialize
  function init() {
    studentNameInput.value = "Nayef";
    studentName = "Nayef";
    currentQuestions = [...capitalsAsia];
    userAnswers = currentQuestions.map(() => ({ selected: null, isCorrect: null, earned: false }));
    currentIdx = 0; points = 0;
    updatePointsUI();
    loadQuestion();
  }
  init();
</script>
</body>
</html>
